name: validate

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bash syntax check
        run: |
          find . -not -path './.git/*' \( -name "*.sh" -o -name ".bashrc" -o -name ".bash_profile" \) \
            | while IFS= read -r f; do
                bash -n "$f" || { echo "Syntax error: $f"; exit 1; }
              done

      - name: ShellCheck
        run: |
          sudo apt-get install -y shellcheck -q
          find . -not -path './.git/*' \( -name "*.sh" -o -name ".bashrc" -o -name ".bash_profile" \) \
            | xargs shellcheck

      - name: Gitleaks
        run: |
          curl -sSL https://github.com/gitleaks/gitleaks/releases/latest/download/gitleaks_linux_x64.tar.gz \
            | tar -xz -C /usr/local/bin gitleaks
          gitleaks detect --redact
