# .tmux.conf — sandbox tmux config
# Optimised for web terminal (ttyd/xterm.js) and mobile

# Use Ctrl-a as prefix (easier on mobile keyboards than Ctrl-b)
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Mouse support — click to select pane/window, scroll history
set -g mouse on

# Start windows and panes at 1
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows on close
set -g renumber-windows on

# Increase history
set -g history-limit 10000

# Status bar
set -g status-bg colour235
set -g status-fg colour250
set -g status-left " #[bold]sandbox#[nobold] "
set -g status-right " %H:%M %d-%b "
set -g status-interval 30

# Split with | and -
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Reload config
bind r source-file ~/.tmux.conf \; display "Config reloaded"
